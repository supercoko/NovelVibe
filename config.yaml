# 小说朗读工具 配置

llm:
  # 当前激活的 provider，从下面 providers 里挑一个
  active: lmstudio

  # 跨 provider 通用参数
  temperature: 0.3
  max_chunk_chars: 5000           # 每次送 LLM 的最大字符数
  request_timeout: 180

  # OpenAI 兼容 API 列表，可任意增删；api_key 支持 ${ENV_VAR} 展开
  providers:
    lmstudio:
      base_url: "http://localhost:1234/v1"
      api_key: "lm-studio"        # LMStudio 不校验，占位即可
      model: "qwen/qwen3.5-9b"
    openai:
      base_url: "https://api.openai.com/v1"
      api_key: "${OPENAI_API_KEY}"
      model: "gpt-4o-mini"
    deepseek:
      base_url: "https://api.deepseek.com/v1"
      api_key: "${DEEPSEEK_API_KEY}"
      model: "deepseek-chat"
    custom:
      base_url: "${CUSTOM_API_URL}"   # 例如部署在本地的 OpenAI API 兼容服务
      api_key: "${CUSTOM_API_KEY}"
      model: "deepseek-v4-flash"

indextts:
  repo_dir: "D:/AI/index-tts"
  cfg_path: "D:/AI/index-tts/checkpoints/config.yaml"
  model_dir: "D:/AI/index-tts/checkpoints"
  use_fp16: true
  device: null                   # null = 自动选 cuda:0
  use_cuda_kernel: null

voices:
  # 角色名 -> 参考音频路径。narrator 必填。
  narrator: "voices/narrator.wav"

audio:
  # 段落间停顿（毫秒）
  pause_after_period: 400
  pause_after_comma: 200
  pause_dialogue_switch: 600
  pause_paragraph: 500
  output_format: "mp3"           # mp3 | wav
  bitrate: "128k"

paths:
  cache_dir: "cache"
  output_dir: "output"
  script_dir: "scripts"          # LLM 拆分结果 JSON
